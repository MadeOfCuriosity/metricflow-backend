version: 1.0
runtime: python311

build:
  commands:
    pre-build:
      - yum install -y gcc python3-devel postgresql-devel
      - pip install --upgrade pip
    build:
      - pip install -r requirements.txt

run:
  command: sh -c "python -c 'from alembic.config import Config; from alembic import command; cfg = Config(\"alembic.ini\"); command.upgrade(cfg, \"head\")' && uvicorn main:app --host 0.0.0.0 --port 8000"
  network:
    port: 8000
    env: APP_PORT
  env:
    - name: ENVIRONMENT
      value: "production"
    - name: FRONTEND_URL
      value: "https://placeholder.amplifyapp.com"
  secrets:
    - name: DATABASE_URL
      value-from: "arn:aws:secretsmanager:us-east-2:170690344518:secret:metricflow/databaseurl-0lANQz"
    - name: SECRET_KEY
      value-from: "arn:aws:secretsmanager:us-east-2:170690344518:secret:metricflow/jwt-secret-nG3RlQ"
